# hydrobricks project file: SOCONT on the Sitter at Appenzell, with declared
# calibration/validation periods and a spin-up policy (split-sample workflow).
# The forcing corrections are calibratable 'param:' references (see the
# data_parameters section).
#
# Used by calibrate_validate_periods.py.

model:
  name: socont
  options:
    soil_storage_nb: 2
    surface_runoff: linear_storage

hydro_units:
  file: ../../tests/files/catchments/ch_sitter_appenzell/hydro_units_elevation.csv

forcing:
  file: ../../tests/files/catchments/ch_sitter_appenzell/meteo.csv
  time: {column: date, format: "%d/%m/%Y"}
  columns:
    precipitation: precip(mm/day)
    temperature: temp(C)
    pet: pet_sim(mm/day)
  ref_elevation: 1253
  temperature:
    gradient: param:temp_gradients
  precipitation:
    correction_factor: param:precip_corr_factor
    gradient: param:precip_gradient

observations:
  file: ../../tests/files/catchments/ch_sitter_appenzell/discharge.csv
  time: {column: Date, format: "%d/%m/%Y"}
  column: Discharge (mm/d)

periods:
  calibration: [1981-01-01, 2000-12-31]
  validation: [2001-01-01, 2020-12-31]
  spinup: 4y  # replay the first 4 years of each period to warm the stores

data_parameters:
  temp_gradients: {value: -0.6, min: -1, max: 0}
  precip_corr_factor: {value: 0.85, min: 0.7, max: 1.3}
  precip_gradient: {value: 0.05, min: 0, max: 0.2}
