# hydrobricks project file: SOCONT on the Sitter at Appenzell, set up for a
# calibration on discharge + MODIS snow cover (calibrate_with_snow_cover.py).
#
# record_all is enabled so the snowpack SWE is recorded and the simulated
# snow cover fraction can be derived from it at evaluation time.

model:
  name: socont
  options:
    soil_storage_nb: 2
    surface_runoff: linear_storage
    record_all: true

hydro_units:
  file: ../../tests/files/catchments/ch_sitter_appenzell/hydro_units_elevation.csv

forcing:
  file: ../../tests/files/catchments/ch_sitter_appenzell/meteo.csv
  time: {column: date, format: "%d/%m/%Y"}
  columns:
    precipitation: precip(mm/day)
    temperature: temp(C)
    pet: pet_sim(mm/day)
  ref_elevation: 1250
  temperature:
    gradient: param:temp_gradients
  precipitation:
    correction_factor: param:precip_corr_factor
    gradient: param:precip_gradient

observations:
  file: ../../tests/files/catchments/ch_sitter_appenzell/discharge.csv
  time: {column: Date, format: "%d/%m/%Y"}
  column: Discharge (mm/d)

periods:
  simulation: [2003-01-01, 2014-12-31]
  spinup: 0   # the calibration uses a legacy warmup instead

data_parameters:
  temp_gradients: {value: -0.6, min: -1, max: 0}
  precip_corr_factor: {value: 0.85, min: 0.7, max: 1.3}
  precip_gradient: {value: 0.05, min: 0, max: 0.2}
